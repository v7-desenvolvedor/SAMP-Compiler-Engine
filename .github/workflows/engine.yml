name: Motor Compilador SA-MP Mobile (Sem Token)

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'Link público do arquivo .zip da source code'
        required: true
      apk_name:
        description: 'Nome final do APK'
        required: false
        default: 'SAMP_Client'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar a Source Code do Usuário
      run: |
        echo "Detectando e baixando o arquivo da source code..."
        
        if [[ "${{ github.event.inputs.zip_url }}" == *"mediafire.com"* ]]; then
          REAL_URL=$(curl -sL "${{ github.event.inputs.zip_url }}" | grep -oE 'https://download[^"]+\.zip' | head -n 1)
        else
          REAL_URL="${{ github.event.inputs.zip_url }}"
        fi
        
        if [ -z "$REAL_URL" ]; then
          echo "ERRO: Não foi possível extrair o link real." && exit 1
        fi
        
        curl -L -o source.zip "$REAL_URL"
        unzip source.zip -d projeto_SAMP
        mv projeto_SAMP/* . || true

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurar Android SDK e NDK
      uses: android-actions/setup-android@v3

    - name: Dar permissão de execução ao Gradle
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        else
          echo "ERRO: Arquivo gradlew não foi encontrado!" && exit 1
        fi

    - name: Compilar o APK (Release)
      run: ./gradlew assembleRelease

    - name: Criar Link de Download do APK Pronto
      run: |
        APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
        if [ -z "$APK_PATH" ]; then
          echo "ERRO: O APK não foi gerado com sucesso." && exit 1
        fi
        
        echo "Fazendo upload do APK para servidor de download direto..."
        # Usando Litterbox: gera link direto .apk que força o download no navegador
        LINK_FINAL=$(curl -s -F "reqtype=fileupload" -F "time=24h" -F "fileToUpload=@$APK_PATH" https://litterbox.catbox.moe/user/api.php)

        echo "=============================================="
        echo "DOWNLOAD_URL: $LINK_FINAL"
        echo "=============================================="
