
name: Motor Compilador SA-MP Mobile (Sem Token)

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'Link público do arquivo .zip da source code'
        required: true
      apk_name:
        description: 'Nome final do APK (Ex: Meu_SAMP)'
        required: false
        default: 'SAMP_Client'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar a Source Code do Usuário
      run: |
        echo "Detectando e baixando o arquivo da source code..."
        
        if [[ "${{ github.event.inputs.zip_url }}" == *"mediafire.com"* ]]; then
          REAL_URL=$(curl -sL "${{ github.event.inputs.zip_url }}" | grep -oE 'https://download[^"]+\.zip' | head -n 1)
        else
          REAL_URL="${{ github.event.inputs.zip_url }}"
        fi
        
        if [ -z "$REAL_URL" ]; then
          echo "ERRO: Não foi possível extrair o link real." && exit 1
        fi
        
        curl -L -o source.zip "$REAL_URL"
        unzip source.zip -d projeto_SAMP
        mv projeto_SAMP/* . || true

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurar Android SDK e NDK
      uses: android-actions/setup-android@v3

    - name: Dar permissão de execução ao Gradle
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        else
          echo "ERRO: Arquivo gradlew não foi encontrado!" && exit 1
        fi

    - name: Compilar o APK (Release)
      run: ./gradlew assembleRelease

    - name: Criar Link de Download do APK Pronto
      run: |
        ORIGINAL_APK=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
        if [ -z "$ORIGINAL_APK" ]; then
          echo "ERRO: O APK não foi gerado com sucesso." && exit 1
        fi
        
        # Define o nome do APK com base no input do usuário
        APK_NAME="${{ github.event.inputs.apk_name }}"
        if [ -z "$APK_NAME" ]; then
          APK_NAME="SAMP_Client"
        fi
        
        # Remove a extensão .apk do input se o usuário já tiver digitado com ela
        APK_NAME=$(echo "$APK_NAME" | sed 's/\.apk$//')
        
        APK_PATH="app/build/outputs/apk/release/${APK_NAME}.apk"
        
        # Renomeia o APK gerado
        mv "$ORIGINAL_APK" "$APK_PATH"
        
        echo "Obtendo o melhor servidor do Gofile..."
        SERVER=$(curl -s https://api.gofile.io/servers | grep -oE '"name":"[^"]+"' | head -n 1 | cut -d'"' -f4)
        if [ -z "$SERVER" ]; then
          SERVER="store3"
        fi
        
        echo "Fazendo upload do APK para o Gofile (Ilimitado)..."
        RESPONSE=$(curl -s -F "file=@$APK_PATH" https://${SERVER}.gofile.io/contents/uploadfile)
        LINK_FINAL=$(echo "$RESPONSE" | grep -oE '"downloadPage":"[^"]+"' | cut -d'"' -f4)

        echo "=============================================="
        echo "DOWNLOAD_URL: $LINK_FINAL"
        echo "=============================================="
