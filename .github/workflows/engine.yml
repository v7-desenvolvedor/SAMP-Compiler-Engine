name: Motor Compilador SA-MP Mobile (Sem Token)

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'Link público do arquivo .zip da source code'
        required: true
      apk_name:
        description: 'Nome final do APK'
        required: false
        default: 'SAMP_Client'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar a Source Code do Usuário
      run: |
        echo "Detectando e baixando o arquivo da source code..."
        
        # Se o link for do MediaFire, extrai o link direto de dentro do HTML de forma automática
        if [[ "${{ github.event.inputs.zip_url }}" == *"mediafire.com"* ]]; then
          echo "Link do MediaFire detectado. Extraindo link direto de download..."
          REAL_URL=$(curl -sL "${{ github.event.inputs.zip_url }}" | grep -oE 'https://download[^"]+\.zip' | head -n 1)
        else
          REAL_URL="${{ github.event.inputs.zip_url }}"
        fi
        
        if [ -z "$REAL_URL" ]; then
          echo "ERRO: Não foi possível extrair o link real. Certifique-se de que o arquivo é público." && exit 1
        fi
        
        echo "Link real de download: $REAL_URL"
        curl -L -o source.zip "$REAL_URL"
        
        echo "Descompactando os arquivos..."
        unzip source.zip -d projeto_SAMP
        
        # Move os arquivos para a raiz do workspace para o compilador achar
        mv projeto_SAMP/* . || true

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurar Android SDK e NDK
      uses: android-actions/setup-android@v3

    - name: Dar permissão de execução ao Gradle
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        else
          echo "ERRO: Arquivo gradlew não foi encontrado na raiz do .zip!" && exit 1
        fi

    - name: Compilar o APK (Release)
      run: ./gradlew assembleRelease

    - name: Criar Link de Download do APK Pronto
      run: |
        APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
        if [ -z "$APK_PATH" ]; then
          echo "ERRO: O APK não foi gerado com sucesso." && exit 1
        fi
        
        echo "Fazendo upload do APK para servidor temporário público alternativo..."
        # Faz o upload usando o bashupload (Osh.at) que é estável e rápido
        LINK_FINAL=$(curl -X POST https://osh.at/u/ -F "file=@$APK_PATH" | grep -oE 'https://osh.at/[A-Za-z0-9]+' | head -n 1)
        
        if [ -z "$LINK_FINAL" ]; then
           # Alternativa secundária caso o principal falhe na hora
           LINK_FINAL=$(curl -F "file=@$APK_PATH" https://file.io)
        fi

        echo "=============================================="
        echo "DOWNLOAD_URL: $LINK_FINAL"
        echo "=============================================="
