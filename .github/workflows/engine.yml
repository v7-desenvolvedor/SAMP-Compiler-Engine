name: Build Android Launcher

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'Link direto ou MediaFire da Source Code (.zip)'
        required: true
        type: string

# Força o ambiente moderno do GitHub Actions (Sgme os avisos do Node 20)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Setup Inicial
      - name: Set up job
        uses: actions/checkout@v4

      # 2. Sistema Avançado de Download e Extração
      - name: Baixar e Extrair Source Code
        run: |
          echo "=============================================="
          echo "INICIANDO DETECÇÃO E DOWNLOAD DA SOURCE CODE"
          echo "=============================================="
          
          INPUT_URL="${{ github.event.inputs.zip_url }}"
          USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          
          if [[ "$INPUT_URL" == *"mediafire.com"* && "$INPUT_URL" != *"download"* ]]; then
            echo "[MediaFire] Detectada página comum. Extraindo link direto..."
            HTML_CONTENT=$(curl -sL -A "$USER_AGENT" "$INPUT_URL")
            REAL_URL=$(echo "$HTML_CONTENT" | grep -oE 'https://download[^"]+\.zip' | head -n 1)
            if [ -z "$REAL_URL" ]; then
              REAL_URL=$(echo "$HTML_CONTENT" | grep -oE 'href="https://[^"]+static\.mediafire\.com[^"]+"' | head -n 1 | cut -d'"' -f2)
            fi
            if [ -z "$REAL_URL" ]; then
              REAL_URL=$(echo "$HTML_CONTENT" | grep -i 'aria-label="Download file"' | grep -oE 'href="[^"]+"' | cut -d'"' -f2)
            fi
          else
            echo "[Direto] Utilizando a URL fornecida diretamente."
            REAL_URL="$INPUT_URL"
          fi
          
          if [ -z "$REAL_URL" ]; then
            echo "::error::[ERRO CRÍTICO] Não foi possível extrair o link de download real."
            exit 1
          fi
          
          echo "Baixando arquivo..."
          if ! curl -f -L -A "$USER_AGENT" -o source.zip "$REAL_URL"; then
            echo "::error::[ERRO CRÍTICO] Falha ao baixar o arquivo."
            exit 1
          fi
          
          mkdir -p temp_extract
          unzip -q source.zip -d temp_extract
          
          PROJECT_ROOT=$(find temp_extract -type f \( -name "gradlew" -o -name "build.gradle" \) | head -n 1 | xargs -I {} dirname "{}")
          if [ -z "$PROJECT_ROOT" ]; then
            echo "::error::[ERRO ESTRUTURAL] Nenhum projeto Gradle encontrado no ZIP!"
            exit 1
          fi
          
          shopt -s dotglob
          mv "$PROJECT_ROOT"/* . 2>/dev/null || true
          shopt -u dotglob
          
          chmod +x ./gradlew 2>/dev/null || true
          rm -rf temp_extract source.zip
          echo "=============================================="

      # 3. Configuração do Java moderno (Node 24 compatível)
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. Cache do Gradle atualizado para v4 (Evita falhas de cache da Microsoft)
      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: false

      # 5. Cache do NDK para compilação C/C++ rápida
      - name: Cache C/C++ Build (NDK)
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/ccache
            .cxx
          key: ${{ runner.os }}-ndk-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ndk-

      # 6. Compilação do APK com tratamento de log para o Bot
      - name: Compilar APK (Debug)
        id: gradle_build
        run: |
          echo "Iniciando compilação do Gradle..."
          ./gradlew assembleDebug --stacktrace --no-daemon

      # 7. Localizar o APK gerado automaticamente
      - name: Localizar APK Gerado
        if: success()
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug/ -type f -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::[ERRO] APK compilou mas o arquivo não foi encontrado!"
            exit 1
          fi
          echo "APK_FOUND=$APK_PATH" >> $GITHUB_ENV
          echo "Encontrado em: $APK_PATH"

      # 8. Upload do arquivo para os servidores do GitHub
      - name: Upload do APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-APK
          path: ${{ env.APK_FOUND }}
          retention-days: 1
